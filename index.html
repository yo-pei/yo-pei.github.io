<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オリジナルポモドーロタイマー</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <meta name="description" content="モダンなダークモードのポモドーロタイマーです。セッション数のトラッキングも可能です。">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Pomodoro Timer</h1>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <button id="sound-toggle-btn" aria-label="Toggle Sound" style="background: none; border: none; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; padding: 0.5rem; transition: color 0.3s ease;">
                    <svg id="sound-on-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="sound-off-icon" viewBox="0 0 24 24" width="24" height="24" fill="currentColor" style="display: none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <div class="session-tracker">
                    <span>セッション: </span>
                    <span id="session-count">0</span>
                </div>
            </div>
        </header>

        <main class="timer-card">
            <div class="mode-tabs">
                <button id="work-tab" class="tab active">作業 (25分)</button>
                <button id="break-tab" class="tab">休憩 (5分)</button>
            </div>
            
            <div class="time-container">
                <button id="minus-btn" class="adjust-btn" aria-label="Subtract 1 minute">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 13H5v-2h14v2z"/></svg>
                </button>
                <div class="timer-display" id="time-left">
                    25:00
                </div>
                <button id="plus-btn" class="adjust-btn" aria-label="Add 1 minute">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
                </button>
            </div>
            
            <div class="controls">
                <button id="start-btn" aria-label="Start Timer">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                </button>
                <button id="pause-btn" aria-label="Pause Timer" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </button>
                <button id="reset-btn" aria-label="Reset Timer">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
                </button>
            </div>
        </main>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
